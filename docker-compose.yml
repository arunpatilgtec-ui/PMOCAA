version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pmo_postgres
    environment:
      POSTGRES_USER: pmo_user
      POSTGRES_PASSWORD: pmo_password
      POSTGRES_DB: pmo_db
    ports:
      - '5432:5432'
    volumes:
      - pmo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pmo_user -d pmo_db']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pmo_app
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://pmo_user:pmo_password@postgres:5432/pmo_db?schema=public
      JWT_SECRET: pmo-super-secret-jwt-key-change-in-production-min-32-chars
      NEXTAUTH_SECRET: pmo-nextauth-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pmo_postgres_data:
